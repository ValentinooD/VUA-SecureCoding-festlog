<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.name} + ' — FestLog'">Event — FestLog</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #050508; --surface: #0e0e14; --surface-2: #16161f;
            --border: #252535; --accent: #00ff87; --accent-dim: #00cc6a;
            --text: #eeeef5; --text-muted: #7070a0;
            --success: #00ff87; --danger: #ff4d6d; --warning: #ffb347; --info: #60a5fa;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        a { color: var(--accent); text-decoration: none; }
        .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 58px; }
        .navbar-brand { font-size: 1.25rem; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; }
        .navbar-nav { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .navbar-nav a { color: var(--text-muted); font-size: 0.875rem; }
        .user-badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; padding: 0.2rem 0.7rem; font-size: 0.78rem; color: var(--text-muted); }
        .btn { display: inline-flex; align-items: center; padding: 0.42rem 1rem; border-radius: 8px; border: 1px solid transparent; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #050508; }
        .btn-primary:hover { background: var(--accent-dim); color: #050508; }
        .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
        .btn-outline:hover { background: var(--surface-2); color: var(--text); }
        .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-sm { padding: 0.28rem 0.65rem; font-size: 0.78rem; }
        .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }
        .breadcrumb { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem; }
        .detail-name { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 0.25rem; }
        .detail-headliner { font-size: 1.1rem; color: var(--accent); font-weight: 700; margin-bottom: 1rem; }
        .badge-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
        .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }
        .badge-festival     { background: rgba(0,255,135,0.12); color: var(--accent); border: 1px solid rgba(0,255,135,0.3); }
        .badge-concert      { background: rgba(96,165,250,0.12); color: var(--info); border: 1px solid rgba(96,165,250,0.3); }
        .badge-club_night   { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
        .badge-open_air     { background: rgba(255,179,71,0.12); color: var(--warning); border: 1px solid rgba(255,179,71,0.3); }
        .badge-livestream   { background: rgba(244,114,182,0.12); color: #f472b6; border: 1px solid rgba(244,114,182,0.3); }
        .badge-rave         { background: rgba(255,77,109,0.12); color: var(--danger); border: 1px solid rgba(255,77,109,0.3); }
        .badge-wishlist        { background: rgba(112,112,160,0.15); color: var(--text-muted); }
        .badge-tickets_secured { background: rgba(96,165,250,0.15); color: var(--info); }
        .badge-attended        { background: rgba(0,255,135,0.15); color: var(--success); }
        .badge-missed          { background: rgba(255,77,109,0.15); color: var(--danger); }
        .badge-cancelled       { background: rgba(255,77,109,0.08); color: #ff8080; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
        .info-item { background: var(--surface-2); border-radius: 8px; padding: 0.75rem 1rem; }
        .info-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.25rem; font-weight: 600; }
        .info-value { font-size: 0.95rem; font-weight: 600; }
        .info-value.green { color: var(--accent); }
        .rating-display { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
        .notes-section h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.65rem; font-weight: 600; }
        .notes-text { color: var(--text-muted); line-height: 1.7; font-size: 0.92rem; }
        .lineup-link { font-size: 0.85rem; }
        .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
        .action-row { display: flex; gap: 0.75rem; align-items: center; }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/events}">FestLog</a>
    <ul class="navbar-nav">
        <li><a th:href="@{/events}">Event Log</a></li>
        <li><span class="user-badge" sec:authentication="name">user</span></li>
        <li>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-outline btn-sm">Logout</button>
            </form>
        </li>
    </ul>
</nav>

<div class="main">
    <div class="breadcrumb">
        <a th:href="@{/events}">Event Log</a> / <span th:text="${event.name}"></span>
    </div>

    <div class="detail-card">
        <div class="detail-name" th:text="${event.name}"></div>
        <div class="detail-headliner" th:text="${event.headliner}"></div>

        <div class="badge-row">
            <span class="badge"
                  th:classappend="'badge-' + ${#strings.toLowerCase(event.eventType.name())}"
                  th:text="${#strings.replace(event.eventType.name(),'_',' ')}"></span>
            <span class="badge"
                  th:classappend="'badge-' + ${#strings.toLowerCase(event.status.name())}"
                  th:text="${#strings.replace(event.status.name(),'_',' ')}"></span>
            <span th:if="${event.genre != null and !event.genre.isBlank()}"
                  style="font-size:0.78rem; color:var(--text-muted);" th:text="${event.genre}"></span>
        </div>

        <div class="info-grid">
            <div class="info-item" th:if="${event.venue != null and !event.venue.isBlank()}">
                <div class="info-label">Venue</div>
                <div class="info-value" th:text="${event.venue}"></div>
            </div>
            <div class="info-item" th:if="${event.city != null and !event.city.isBlank()}">
                <div class="info-label">Location</div>
                <div class="info-value" th:text="${event.city} + (${event.country != null and !event.country.isBlank()} ? ', ' + ${event.country} : '')"></div>
            </div>
            <div class="info-item" th:if="${event.eventDate != null}">
                <div class="info-label">Date</div>
                <div class="info-value" th:text="${#temporals.format(event.eventDate, 'dd. MM. yyyy.')}"></div>
            </div>
            <div class="info-item" th:if="${event.ticketPrice != null}">
                <div class="info-label">Ticket Price</div>
                <div class="info-value" th:text="'€' + ${event.ticketPrice}"></div>
            </div>
            <div class="info-item" th:if="${event.personalRating != null}">
                <div class="info-label">My Rating</div>
                <div class="info-value green rating-display" th:text="${event.personalRating} + ' / 10'"></div>
            </div>
            <div class="info-item" th:if="${event.addedBy != null}">
                <div class="info-label">Added by</div>
                <div class="info-value" th:text="${event.addedBy}"></div>
            </div>
        </div>

        <div th:if="${event.lineupUrl != null and !event.lineupUrl.isBlank()}" style="margin-bottom:1.25rem;">
            <a class="lineup-link" th:href="${event.lineupUrl}" target="_blank"
               th:text="${event.lineupUrl}"></a>
        </div>

        <div class="notes-section" th:if="${event.notes != null and !event.notes.isBlank()}">
            <h3>Notes</h3>
            <p class="notes-text" th:text="${event.notes}"></p>
        </div>

        <hr class="divider">

        <div class="action-row">
            <a th:href="@{/events}" class="btn btn-outline">Back</a>
            <a th:href="@{/events/edit/{id}(id=${event.id})}"
               class="btn btn-primary" sec:authorize="hasRole('ADMIN')">Edit</a>
            <form th:action="@{/events/delete/{id}(id=${event.id})}" method="post"
                  sec:authorize="hasRole('ADMIN')" onsubmit="return confirm('Remove this event?')">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
