<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events — FestLog</title>
    <link rel="stylesheet" th:href="@{/css/list.css}"/>

</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/events}">FestLog</a>
    <ul class="navbar-nav">
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/events/new}">+ Add Event</a></li>
        <li><a href="/swagger-ui.html" target="_blank">API Docs</a></li>
        <li><span class="user-badge" sec:authentication="name">user</span></li>
        <li>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-outline btn-sm">Logout</button>
            </form>
        </li>
    </ul>
</nav>

<div class="main">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <div class="page-header">
        <h1 class="page-title">Event Log</h1>
        <span class="user-badge" th:text="${events.size()} + ' events'"></span>
    </div>

    <form class="search-bar" th:action="@{/events}" method="get">
        <div class="sg" style="flex:2; min-width:200px;">
            <label>Search</label>
            <input class="form-control" type="text" name="query" th:value="${query}" placeholder="Name or headliner...">
        </div>
        <div class="sg">
            <label>Type</label>
            <select class="form-select" name="type">
                <option value="">All types</option>
                <option th:each="t : ${eventTypes}" th:value="${t}"
                        th:text="${#strings.replace(t.name(),'_',' ')}"
                        th:selected="${selectedType == t}"></option>
            </select>
        </div>
        <div class="sg">
            <label>Status</label>
            <select class="form-select" name="status">
                <option value="">All statuses</option>
                <option th:each="s : ${eventStatuses}" th:value="${s}"
                        th:text="${#strings.replace(s.name(),'_',' ')}"
                        th:selected="${selectedStatus == s}"></option>
            </select>
        </div>
        <div class="sg">
            <label>City</label>
            <input class="form-control" type="text" name="city" th:value="${city}" placeholder="e.g. Zagreb">
        </div>
        <div style="display:flex; gap:0.5rem; align-items:flex-end;">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/events}" class="btn btn-outline">Clear</a>
        </div>
    </form>

    <div th:if="${events.isEmpty()}" class="empty-state">
        <h3>No events found</h3>
        <p>Try different filters or add your first event.</p>
    </div>

    <div class="grid" th:unless="${events.isEmpty()}">
        <div class="card" th:each="event : ${events}">
            <div class="card-top">
                <div>
                    <div class="card-name">
                        <a th:href="@{/events/{id}(id=${event.id})}" th:text="${event.name}"></a>
                    </div>
                    <div class="card-headliner" th:text="${event.headliner}"></div>
                </div>
                <span class="badge"
                      th:classappend="'badge-' + ${#strings.toLowerCase(event.status.name())}"
                      th:text="${#strings.replace(event.status.name(),'_',' ')}"></span>
            </div>

            <div style="display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center;">
                <span class="badge"
                      th:classappend="'badge-' + ${#strings.toLowerCase(event.eventType.name())}"
                      th:text="${#strings.replace(event.eventType.name(),'_',' ')}"></span>
                <span th:if="${event.genre != null and !event.genre.isBlank()}"
                      style="font-size:0.75rem; color:var(--text-muted);" th:text="${event.genre}"></span>
            </div>

            <div class="event-meta">
                <span th:if="${event.city != null and !event.city.isBlank()}"
                      th:text="${event.city} + (${event.country != null and !event.country.isBlank()} ? ', ' + ${event.country} : '')"></span>
                <span th:if="${event.eventDate != null}"
                      th:text="${#temporals.format(event.eventDate, 'dd. MM. yyyy.')}"></span>
                <span class="ticket-price" th:if="${event.ticketPrice != null}"
                      th:text="'€' + ${event.ticketPrice}"></span>
            </div>

            <div class="rating-stars" th:if="${event.personalRating != null}">
                <span th:text="'★ ' + ${event.personalRating} + '/10'"></span>
            </div>

            <p class="card-notes" th:if="${event.notes != null and !event.notes.isBlank()}"
               th:text="${event.notes}"></p>

            <div class="card-actions" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/events/edit/{id}(id=${event.id})}" class="btn btn-outline btn-sm">Edit</a>
                <form th:action="@{/events/delete/{id}(id=${event.id})}" method="post"
                      onsubmit="return confirm('Remove this event?')">
                    <button type="submit" class="btn-danger-sm">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
