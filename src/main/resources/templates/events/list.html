<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events — FestLog</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #050508; --surface: #0e0e14; --surface-2: #16161f;
            --border: #252535; --accent: #00ff87; --accent-dim: #00cc6a;
            --text: #eeeef5; --text-muted: #7070a0;
            --success: #00ff87; --danger: #ff4d6d; --warning: #ffb347; --info: #60a5fa;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        a { color: var(--accent); text-decoration: none; }

        .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; }
        .navbar-brand { font-size: 1.25rem; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; }
        .navbar-nav { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .navbar-nav a { color: var(--text-muted); font-size: 0.875rem; }
        .navbar-nav a:hover { color: var(--text); }
        .user-badge { background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; padding: 0.2rem 0.7rem; font-size: 0.78rem; color: var(--text-muted); }

        .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.42rem 1rem; border-radius: 8px; border: 1px solid transparent; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #050508; }
        .btn-primary:hover { background: var(--accent-dim); color: #050508; }
        .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
        .btn-outline:hover { background: var(--surface-2); color: var(--text); }
        .btn-sm { padding: 0.28rem 0.65rem; font-size: 0.78rem; }
        .btn-danger-sm { background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 8px; padding: 0.28rem 0.65rem; font-size: 0.78rem; font-weight: 600; cursor: pointer; }
        .btn-danger-sm:hover { background: var(--danger); color: #fff; }

        .main { max-width: 1150px; margin: 0 auto; padding: 2rem 1.5rem; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .page-title { font-size: 1.4rem; font-weight: 800; }

        .search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end; }
        .sg { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 140px; }
        .sg label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control, .form-select { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 0.45rem 0.7rem; border-radius: 8px; font-size: 0.875rem; appearance: none; width: 100%; }
        .form-control:focus, .form-select:focus { outline: none; border-color: var(--accent); }
        .form-control::placeholder { color: var(--text-muted); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.65rem; transition: border-color 0.15s; }
        .card:hover { border-color: rgba(0,255,135,0.35); }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
        .card-name { font-weight: 700; font-size: 0.95rem; }
        .card-name a { color: var(--text); }
        .card-name a:hover { color: var(--accent); }
        .card-headliner { font-size: 0.82rem; color: var(--accent); font-weight: 600; margin-top: 0.1rem; }

        .badge { display: inline-block; padding: 0.18rem 0.52rem; border-radius: 6px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }
        .badge-festival     { background: rgba(0,255,135,0.12); color: var(--accent); border: 1px solid rgba(0,255,135,0.3); }
        .badge-concert      { background: rgba(96,165,250,0.12); color: var(--info); border: 1px solid rgba(96,165,250,0.3); }
        .badge-club_night   { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
        .badge-open_air     { background: rgba(255,179,71,0.12); color: var(--warning); border: 1px solid rgba(255,179,71,0.3); }
        .badge-livestream   { background: rgba(244,114,182,0.12); color: #f472b6; border: 1px solid rgba(244,114,182,0.3); }
        .badge-rave         { background: rgba(255,77,109,0.12); color: var(--danger); border: 1px solid rgba(255,77,109,0.3); }

        .badge-wishlist        { background: rgba(112,112,160,0.15); color: var(--text-muted); }
        .badge-tickets_secured { background: rgba(96,165,250,0.15); color: var(--info); }
        .badge-attended        { background: rgba(0,255,135,0.15); color: var(--success); font-weight: 800; }
        .badge-missed          { background: rgba(255,77,109,0.15); color: var(--danger); }
        .badge-cancelled       { background: rgba(255,77,109,0.08); color: #ff8080; }

        .rating-stars { font-size: 0.85rem; color: var(--accent); font-weight: 700; }
        .event-meta { font-size: 0.78rem; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .ticket-price { font-size: 0.82rem; color: var(--text-muted); }
        .card-notes { color: var(--text-muted); font-size: 0.8rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-actions { display: flex; gap: 0.5rem; margin-top: 0.4rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .empty-state h3 { color: var(--text); font-size: 1.1rem; margin-bottom: 0.5rem; }
        .alert-success { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.25rem; font-size: 0.875rem; background: rgba(0,255,135,0.08); border: 1px solid rgba(0,255,135,0.25); color: var(--success); }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/events}">FestLog</a>
    <ul class="navbar-nav">
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/events/new}">+ Add Event</a></li>
        <li><a href="/swagger-ui.html" target="_blank">API Docs</a></li>
        <li><span class="user-badge" sec:authentication="name">user</span></li>
        <li>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-outline btn-sm">Logout</button>
            </form>
        </li>
    </ul>
</nav>

<div class="main">
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

    <div class="page-header">
        <h1 class="page-title">Event Log</h1>
        <span class="user-badge" th:text="${events.size()} + ' events'"></span>
    </div>

    <form class="search-bar" th:action="@{/events}" method="get">
        <div class="sg" style="flex:2; min-width:200px;">
            <label>Search</label>
            <input class="form-control" type="text" name="query" th:value="${query}" placeholder="Name or headliner...">
        </div>
        <div class="sg">
            <label>Type</label>
            <select class="form-select" name="type">
                <option value="">All types</option>
                <option th:each="t : ${eventTypes}" th:value="${t}"
                        th:text="${#strings.replace(t.name(),'_',' ')}"
                        th:selected="${selectedType == t}"></option>
            </select>
        </div>
        <div class="sg">
            <label>Status</label>
            <select class="form-select" name="status">
                <option value="">All statuses</option>
                <option th:each="s : ${eventStatuses}" th:value="${s}"
                        th:text="${#strings.replace(s.name(),'_',' ')}"
                        th:selected="${selectedStatus == s}"></option>
            </select>
        </div>
        <div class="sg">
            <label>City</label>
            <input class="form-control" type="text" name="city" th:value="${city}" placeholder="e.g. Zagreb">
        </div>
        <div style="display:flex; gap:0.5rem; align-items:flex-end;">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/events}" class="btn btn-outline">Clear</a>
        </div>
    </form>

    <div th:if="${events.isEmpty()}" class="empty-state">
        <h3>No events found</h3>
        <p>Try different filters or add your first event.</p>
    </div>

    <div class="grid" th:unless="${events.isEmpty()}">
        <div class="card" th:each="event : ${events}">
            <div class="card-top">
                <div>
                    <div class="card-name">
                        <a th:href="@{/events/{id}(id=${event.id})}" th:text="${event.name}"></a>
                    </div>
                    <div class="card-headliner" th:text="${event.headliner}"></div>
                </div>
                <span class="badge"
                      th:classappend="'badge-' + ${#strings.toLowerCase(event.status.name())}"
                      th:text="${#strings.replace(event.status.name(),'_',' ')}"></span>
            </div>

            <div style="display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center;">
                <span class="badge"
                      th:classappend="'badge-' + ${#strings.toLowerCase(event.eventType.name())}"
                      th:text="${#strings.replace(event.eventType.name(),'_',' ')}"></span>
                <span th:if="${event.genre != null and !event.genre.isBlank()}"
                      style="font-size:0.75rem; color:var(--text-muted);" th:text="${event.genre}"></span>
            </div>

            <div class="event-meta">
                <span th:if="${event.city != null and !event.city.isBlank()}"
                      th:text="${event.city} + (${event.country != null and !event.country.isBlank()} ? ', ' + ${event.country} : '')"></span>
                <span th:if="${event.eventDate != null}"
                      th:text="${#temporals.format(event.eventDate, 'dd. MM. yyyy.')}"></span>
                <span class="ticket-price" th:if="${event.ticketPrice != null}"
                      th:text="'€' + ${event.ticketPrice}"></span>
            </div>

            <div class="rating-stars" th:if="${event.personalRating != null}">
                <span th:text="'★ ' + ${event.personalRating} + '/10'"></span>
            </div>

            <p class="card-notes" th:if="${event.notes != null and !event.notes.isBlank()}"
               th:text="${event.notes}"></p>

            <div class="card-actions" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/events/edit/{id}(id=${event.id})}" class="btn btn-outline btn-sm">Edit</a>
                <form th:action="@{/events/delete/{id}(id=${event.id})}" method="post"
                      onsubmit="return confirm('Remove this event?')">
                    <button type="submit" class="btn-danger-sm">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
