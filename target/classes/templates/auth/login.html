<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FestLog</title>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>

</head>
<body>
<div class="auth-box">
    <div class="brand">FestLog</div>
    <div class="subtitle">Every show. Every memory. Logged.</div>

    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <form th:action="@{/auth/login}" method="post">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input id="username" class="form-control" type="text" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input id="password" class="form-control" type="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-submit">SIGN IN</button>
    </form>

    <div class="footer-link">No account? <a th:href="@{/auth/register}">Register</a></div>
</div>
</body>
</html>
